  analogy:`G1 = warming up before a race. S phase = making a photocopy of every document you own. G2 = packing your bag before a trip and checking you have everything.`,
  tested:`Questions often describe a cell activity and ask which phase it's in. Key clues: DNA being copied = S phase. Cell just growing or preparing = G1 or G2. If asked what happens in S phase, the answer is always DNA replication.`
},
cell_2:{
  explanation:`A cell spends the vast majority of its time in <strong>interphase</strong> — specifically in G1. Division (mitosis) is actually a very brief event in the life of a cell. This is why if you look at a tissue sample under a microscope, most cells appear to be in interphase, not dividing.`,
  analogy:`Imagine a chef who spends 90% of their day prepping ingredients and only 10% actually cooking. The cooking (mitosis) is the dramatic part, but prep (interphase) is where most of the time goes.`,
  tested:`This is a straightforward factual question but students often say "mitosis" because it seems like the main event. The correct answer is <strong>interphase</strong> (G1 specifically). Don't be fooled by the drama of cell division.`
},
cell_3:{
  explanation:`Normal cells have built-in <strong>checkpoints</strong> — moments where the cell pauses and checks that everything is okay before proceeding. Cancerous cells have mutations that disable these checkpoints, so they skip the quality checks and divide over and over without stopping. They also stop responding to signals that normally tell a cell to stop dividing or self-destruct (apoptosis).`,
  analogy:`Imagine a factory assembly line with quality control stops. A normal product gets checked at each station. A broken system that bypasses all the checks just keeps producing defective products indefinitely — that's a cancer cell.`,
  tested:`Exam questions often describe a cell behaving abnormally and ask what went wrong. The answer almost always involves <strong>checkpoint failure</strong> or uncontrolled division. Also know: bypassing checkpoints → tumor formation.`
},
cell_4:{
  explanation:`A <strong>karyotype</strong> is a photograph of all the chromosomes in a cell, sorted by size and shape into numbered pairs. It tells you three key things: the total number of chromosomes (46 in normal humans), whether any chromosomes are missing or duplicated (like trisomy 21 = three copies at position 21), and the organism's biological sex (look at pair 23 — XX or XY).`,
  analogy:`Think of a karyotype like a sorted laundry pile. Each matching pair of socks is a homologous chromosome pair. Three socks of the same type means something went wrong. The last pair tells you the sex.`,
  tested:`The exam may show a karyotype image and ask you to identify sex and/or chromosomal abnormalities. Always look at <strong>pair 23</strong> for sex (XX vs XY) and count at any unusual position for trisomy or monosomy.`,
  svgKey:`karyotype`
},
cell_5:{
  explanation:`Humans have 23 chromosome pairs. The 23rd pair are the <strong>sex chromosomes</strong>. If that pair is <strong>XX</strong>, the individual is biologically female. If it's <strong>XY</strong>, male. The Y chromosome is noticeably smaller than the X — easy to spot on a karyotype. <strong>Trisomy</strong> means three chromosomes at one position instead of two — trisomy 21 is the most well-known (three copies of chromosome 21 → Down syndrome).`,
  analogy:`Pair 23 is like a name tag on the chromosome set. Two matching sizes = XX (female). One normal, one clearly smaller = XY (male). And if you see a trio at position 21, that's trisomy — three's a crowd.`,
  tested:`A karyotype image will be shown and you'll need to identify sex and spot trisomy. If both chromosomes in pair 23 look the same size = XX. If one is visibly smaller = XY. Three chromosomes at the same numbered position = trisomy.`,
  svgKey:`karyotype`
},
cell_6:{
  explanation:`These are all related to DNA and cell division. <strong>Chromatin</strong> is DNA in its loose, unwound form (how it exists during interphase). A <strong>chromosome</strong> is the same DNA condensed into a tight, visible structure during mitosis. <strong>Sister chromatids</strong> are two identical copies of one chromosome connected at the <strong>centromere</strong> after replication — the centromere is the pinch point holding them together. The <strong>spindle</strong> is the network of protein fibers that pulls chromosomes to opposite ends of the cell.`,
  analogy:`Chromatin is like a loose garden hose. A chromosome is that hose coiled up tightly. Sister chromatids are two identical hoses clipped together at the middle (the centromere). The spindle fibers are the hands that grab and pull them apart.`,
  tested:`You'll be shown a diagram and asked to label these structures, or given a description and asked to name the term. The most common mix-up: <strong>centromere vs. chromatid</strong>. Centromere = the junction point. Chromatid = the whole arm of the chromosome.`
},
cell_7:{
  explanation:`Mitosis has four phases. <strong>Prophase</strong>: chromosomes condense and become visible; spindle fibers form. <strong>Metaphase</strong>: chromosomes line up along the center (equator) of the cell — this is the easiest phase to spot. <strong>Anaphase</strong>: sister chromatids are pulled to opposite poles. <strong>Telophase</strong>: nuclear envelopes reform around each chromosome set; cell begins to pinch. Then <strong>cytokinesis</strong> finishes by splitting the cytoplasm.`,
  analogy:`PMAT = "People Meet And Talk." Prophase = people arrive and get ready. Metaphase = everyone lines up in the middle of the room. Anaphase = they walk to opposite sides. Telophase = two separate conversations begin.`,
  tested:`The exam will show a diagram of a cell in one phase and ask you to identify it. Key tells: chromosomes lined up in middle = <strong>Metaphase</strong>. Chromosomes visibly being pulled apart = <strong>Anaphase</strong>. Chromosomes condensed but scattered = Prophase.`,
  svgKey:`mitosis`
},
cell_8:{
  explanation:`Mitosis produces <strong>two daughter cells</strong> that are genetically identical to each other and to the original parent cell. They are <strong>diploid (2n)</strong> — they have the full chromosome number. This is essential for growth and tissue repair — when you replace cells after a cut, you want the new cells to be exactly like the originals.`,
  analogy:`Mitosis is like a photocopier. You put in one page (the parent cell) and get two perfect, identical copies out. No information is added or lost.`,
  tested:`The exam contrasts mitosis and meiosis products. Mitosis = <strong>2 identical diploid cells</strong>. Meiosis = 4 unique haploid cells. The word "identical" is key for mitosis — never use it to describe meiosis products.`
},
cell_9:{
  explanation:`After mitosis, the cytoplasm must be physically divided. In <strong>animal cells</strong>, the cell membrane pinches inward like a drawstring bag being pulled tight — this groove is called the <strong>cleavage furrow</strong>. Plant cells can't pinch because they have a rigid cell wall, so instead they build a <strong>cell plate</strong> down the center, which grows outward and becomes the new wall separating the two daughter cells.`,
  analogy:`Animal cell = splitting a water balloon by squeezing the middle. Plant cell = building a brick wall down the center of a room to divide it in two.`,
  tested:`This is a classic compare/contrast question. Two key terms: <strong>cleavage furrow</strong> (animal) and <strong>cell plate</strong> (plant). Know which goes with which organism type — the exam will test this directly.`
},
cell_10:{
  explanation:`Key vocab for meiosis: <strong>Diploid (2n)</strong> = two full chromosome sets (humans: 46). <strong>Haploid (n)</strong> = one set (human gametes: 23). A <strong>gamete</strong> is a sex cell — sperm or egg. A <strong>zygote</strong> is the diploid cell formed when sperm + egg fuse. <strong>Homologous pairs</strong> are two matching chromosomes (one from mom, one from dad, carrying the same genes). <strong>Crossing over</strong> is the exchange of DNA segments between homologs during Meiosis I, creating new allele combinations.`,
  analogy:`Think of diploid as owning two copies of every book in a library. Haploid is donating one copy to a new library. When two haploid libraries (sperm + egg) merge at fertilization, the new zygote has a full diploid library again.`,
  tested:`These terms appear in almost every meiosis question. Know <strong>diploid vs. haploid</strong> cold and what number each represents in humans (2n=46, n=23). Also know that homologous pairs carry the same genes but may carry different alleles.`
},
cell_11:{
  explanation:`Meiosis produces <strong>four haploid (n) daughter cells</strong>. Because of crossing over and independent assortment, all four cells are <strong>genetically unique</strong> — none are identical to each other or to the parent cell. This genetic variation is the whole point of sexual reproduction: it generates diversity in offspring.`,
  analogy:`If mitosis is a photocopier, meiosis is a remix board. You start with one song (parent cell), shuffle and recombine all the tracks, and end up with four completely unique remixes — none the same as the original.`,
  tested:`Always contrast with mitosis (2 identical diploid cells). Meiosis = <strong>4 unique haploid cells</strong>. The exam especially tests the word "unique" — meiosis is the process that generates genetic diversity. If a question asks which process creates variation, the answer is meiosis.`
},
cell_12:{
  explanation:`Meiosis occurs <strong>only in the reproductive organs (gonads)</strong>. In males, it happens in the <strong>testes</strong> and produces sperm. In females, it happens in the <strong>ovaries</strong> and produces eggs (ova). Every other cell division in the body — for growth, repair, or replacement — uses mitosis.`,
  analogy:`The gonads are the only factories licensed to produce gametes. Every other factory in the body makes regular body cells via mitosis. Only the testes and ovaries get the meiosis production line.`,
  tested:`A question might describe a process and ask where it occurs. If it involves <strong>gamete production</strong>, the answer is gonads (testes or ovaries). All other body cells divide by mitosis. This is a location question, not a process question.`
},
cell_13:{
  explanation:`During <strong>Prophase I</strong> of meiosis, homologous chromosome pairs line up side-by-side and physically exchange segments of DNA — this is <strong>crossing over</strong>. The result is chromosomes that carry a mix of alleles from both the maternal and paternal chromosomes — a combination that has never existed before. Crossing over is a major source of genetic diversity in sexually reproducing organisms.`,
  analogy:`Imagine two decks of cards — one red-backed, one blue-backed. Crossing over is like swapping a few cards between decks. Each deck now has a unique mix of red and blue cards. No two shuffles produce the same result.`,
  tested:`The exam will ask when crossing over occurs (<strong>Prophase I</strong>), what it produces (new allele combinations), and why it matters (genetic diversity). Don't say "Prophase II" — crossing over is exclusively Meiosis I.`
},
cell_14:{
  explanation:`<strong>Mitosis:</strong> 1 division → 2 identical diploid cells → used for growth and repair. <strong>Meiosis:</strong> 2 divisions (Meiosis I + II) → 4 unique haploid cells → used for sexual reproduction. Meiosis I is the "reduction division" where homologous pairs separate. Meiosis II resembles mitosis — sister chromatids separate. Crossing over only occurs in meiosis; mitosis has no crossing over.`,
  analogy:`Mitosis is a clean photocopier — same in, same out. Meiosis is a photocopier that also shuffles pages, cuts the stack in half, then cuts each half again — four unique quarter-stacks emerge.`,
  tested:`A comparison table is almost guaranteed on the exam. Memorize: divisions (1 vs 2), products (2 identical diploid vs 4 unique haploid), purpose (growth/repair vs reproduction), and whether cells are genetically identical (yes for mitosis, no for meiosis).`
},
cell_15:{
  explanation:`No — gametes are <strong>haploid</strong>, meaning they have only ONE copy of each chromosome. Homologous pairs only exist in <strong>diploid</strong> cells. A gamete carries chromosome 1 (from either mom or dad), chromosome 2, and so on — just one copy each. When sperm and egg fuse during fertilization, the resulting zygote restores the homologous pairs by bringing together one set from each parent.`,
  analogy:`If a full deck of 52 cards (26 pairs) represents a diploid body cell, a gamete is a half-deck of 26 unpaired cards. You can't have pairs when you only have one of each card. Fertilization reunites two half-decks into a full paired deck.`,
  tested:`Questions may ask whether gametes have homologous pairs — the answer is <strong>no</strong>. They are haploid with no homologs. Homologous pairs only exist in diploid (2n) cells. The moment of fertilization is when homologous pairs are recreated.`
},
cell_16:{
  explanation:`There are two key separation events in meiosis. In <strong>Meiosis I</strong>, the <strong>homologous chromosome pairs</strong> separate — each cell gets one chromosome from each pair, but both sister chromatids of that chromosome are still joined. In <strong>Meiosis II</strong>, the <strong>sister chromatids</strong> finally separate — this produces the final four haploid cells. Note: in mitosis, sister chromatids also separate — but in anaphase, not in a "Meiosis II."`,
  analogy:`Meiosis I is like separating a pair of shoes into two piles (one shoe per pile). Meiosis II is like untying the two parts of each shoe. You started with pairs of pairs; you end with individual parts.`,
  tested:`The exam specifically asks which separation happens in which division. <strong>Homologs separate in Meiosis I. Sister chromatids separate in Meiosis II.</strong> This is high-value because it's easy to mix up. Think: Meiosis I = the BIG separation (reduces ploidy). Meiosis II = the fine separation (like mitosis).`
},
cell_17:{
  explanation:`<strong>Nondisjunction</strong> occurs when chromosomes fail to separate properly during meiosis (or mitosis). The result: gametes with an abnormal chromosome number — either one extra (<strong>n+1</strong>) or one missing (<strong>n−1</strong>). When these gametes are fertilized, the zygote has <strong>trisomy</strong> (2n+1, like Down syndrome from three copies of chromosome 21) or <strong>monosomy</strong> (2n−1). Nondisjunction can happen in Meiosis I (homologs don't separate) or Meiosis II (sister chromatids don't separate).`,
  analogy:`Imagine sorting a deck of cards into two equal piles and accidentally putting two aces into one pile instead of splitting them. That pile now has too many aces — that imbalance is nondisjunction.`,
  tested:`The exam asks what nondisjunction is, when it can occur (Meiosis I or II), and what the downstream consequences are. <strong>Down syndrome (trisomy 21)</strong> is the go-to example. Know that nondisjunction during Meiosis I affects more chromosomes than nondisjunction during Meiosis II.`
},

// ── GENETICS ──────────────────────────────────────────────────
genetics_0:{
  explanation:`Every gene in your body exists as two copies called <strong>alleles</strong> — one inherited from each parent. If both alleles are the same (BB or bb), you are <strong>homozygous</strong> for that gene. If they're different (Bb), you are <strong>heterozygous</strong>. A <strong>dominant</strong> allele (capital letter) is expressed whenever it's present — even one copy is enough. A <strong>recessive</strong> allele (lowercase) is only expressed when there is no dominant allele present — you need two copies (bb) to show the recessive trait.`,
  analogy:`Think of alleles like volume settings. Dominant is a loudspeaker — it drowns everything out. Recessive is a whisper — it only gets heard when there's absolutely no loudspeaker in the room.`,
  tested:`If a person shows a recessive trait (like blue eyes if recessive), they must be <strong>homozygous recessive (bb)</strong>. This logic underpins every Punnett square. Heterozygous individuals (Bb) show the dominant trait even though they carry the recessive allele.`
},
genetics_1:{
  explanation:`A <strong>dominant</strong> allele is expressed whenever it is present — even just one copy. A <strong>recessive</strong> allele is only expressed when there are two copies (homozygous recessive). You write dominant with a capital letter (B) and recessive with lowercase (b). The <strong>genotype</strong> is the actual allele combination (Bb). The <strong>phenotype</strong> is the observable trait that results. A heterozygous individual (Bb) has a dominant phenotype but carries the recessive allele hidden.`,
  analogy:`Think of dominant as coffee flavor and recessive as water. Mix coffee and water — you taste the coffee. You only taste the water when there's no coffee at all. The recessive flavor only comes through when dominant is absent.`,
  tested:`If someone shows a recessive trait, their genotype must be <strong>lowercase/lowercase (bb)</strong> — no exceptions. If a parent with a dominant phenotype has a recessive child, the parent must be heterozygous (Bb). These deductions are tested constantly on Punnett square problems.`
},
genetics_2:{
  explanation:`Mendel worked across multiple generations of pea plants. The <strong>P generation</strong> is the original pure-breeding parents. The <strong>F1 generation</strong> (first filial) is their offspring — all identical if both P parents are homozygous. The <strong>F2 generation</strong> comes from crossing two F1 individuals. Mendel observed that recessive traits disappeared in F1 but reappeared in roughly 1 out of 4 F2 offspring — this revealed the 3:1 dominant:recessive ratio and the existence of hidden (recessive) alleles.`,
  analogy:`P = your grandparents. F1 = your parents. F2 = you and your siblings. A trait that Grandpa had (but neither parent showed) can suddenly reappear in a grandchild. Mendel explained why.`,
  tested:`Exam questions may describe a cross involving F1 or F2 and ask what ratio of offspring to expect, or ask which generation shows the classic <strong>3:1 ratio</strong> (F2 from two heterozygous F1 parents). Know that F1 offspring of two pure-breeding parents are all heterozygous.`
},
genetics_3:{
  explanation:`A <strong>dihybrid cross</strong> tracks two traits simultaneously. You need a <strong>4×4 Punnett square</strong> (16 boxes) to work it out. When both parents are heterozygous for both traits (AaBb × AaBb), the expected phenotype ratio of offspring is <strong>9:3:3:1</strong> — 9 with both dominant traits expressed, 3 with one dominant + one recessive, 3 with the other dominant + one recessive, and 1 with both recessive. This ratio only works if the two genes are on different chromosomes (unlinked).`,
  analogy:`Think of a dihybrid cross like flipping two separate coins at once. The result of coin 1 (trait A) has absolutely nothing to do with the result of coin 2 (trait B). Each coin flip is independent.`,
  tested:`You'll need to either set up a 4×4 Punnett square or recognize the <strong>9:3:3:1 ratio</strong>. The exam sometimes asks what fraction of offspring will show a specific combination — e.g., "what fraction will be recessive for both traits?" (answer: 1/16).`
},
genetics_4:{
  explanation:`Mendel's <strong>Law of Independent Assortment</strong> states that alleles for different traits are sorted into gametes independently of each other — as long as those genes are on different chromosomes. This happens because homologous chromosomes line up randomly during Meiosis I. It's why a child doesn't always inherit the same parent's traits together (e.g., having Dad's eye color doesn't predict whose nose they have).`,
  analogy:`Imagine two bags — one with cards labeled "A" or "a," another with "B" or "b." You randomly draw one card from each bag. What you draw from bag 1 has nothing to do with what you draw from bag 2. The draws are completely independent.`,
  tested:`Questions may describe two traits and ask if they assort independently. If the genes are on <strong>different chromosomes</strong>, yes — they follow independent assortment. Genes on the <strong>same chromosome</strong> are linked and do not follow this law (they tend to be inherited together).`
},
genetics_5:{
  explanation:`Mendel's <strong>Law of Segregation</strong> states that every organism has two alleles for each trait, and during gamete formation these alleles <strong>separate (segregate)</strong> so each gamete gets exactly one. This happens because homologous chromosomes separate during Meiosis I. This is why you inherit exactly one allele from each parent, not both — each parent's gamete contributed only one copy.`,
  analogy:`Imagine you have two lottery balls — one red, one blue. When you form a gamete, you can only put ONE ball in the envelope. Each gamete gets one, and the other goes to a different gamete. Both parents do this, and fertilization brings two single-allele gametes together.`,
  tested:`Questions may ask which law explains why gametes are haploid for each gene, or why offspring receive one allele from each parent. The answer is the <strong>Law of Segregation</strong>. Distinguish it from Independent Assortment, which is about different genes, not the same gene.`
},
genetics_6:{
  explanation:`In standard dominance, one allele fully masks the other. In <strong>codominance</strong>, both alleles are fully expressed simultaneously — both traits appear as distinct patches side by side (roan cattle have individual <em>red</em> hairs AND <em>white</em> hairs — not pink hairs). In <strong>incomplete dominance</strong>, neither allele fully dominates and the result is a <em>blended</em> intermediate phenotype (red + white flowers → pink flowers — no red or white, just a new pink). The key question: can you see both original traits separately, or is there a new blended trait?`,
  analogy:`Codominance = tie-dye: you can see both original colors clearly and separately. Incomplete dominance = mixing red and white paint: you get pink, and the original colors are no longer visible.`,
  tested:`This is one of the most tested non-Mendelian patterns. Look for keywords: <strong>"patches," "spots," or "both visible"</strong> = codominance. <strong>"Blend," "intermediate," or "in-between"</strong> = incomplete dominance. The trap is treating them as interchangeable — they are fundamentally different outcomes.`
},
genetics_7:{
  explanation:`Humans have 23 chromosome pairs. The 23rd pair are the <strong>sex chromosomes</strong>. Females have two X chromosomes (<strong>XX</strong>) — roughly the same size. Males have one X and one Y chromosome (<strong>XY</strong>) — the Y is significantly shorter than the X. This genetic difference triggers sex determination during embryonic development. The Y chromosome contains the <strong>SRY gene</strong>, which initiates male development.`,
  analogy:`Think of the 23rd pair as a matching game. Two matching chromosomes of similar size = XX (female). One normal size + one noticeably smaller = XY (male). The size difference is the visual key on a karyotype.`,
  tested:`Know XX = female, XY = male. Also know that <strong>fathers determine the sex</strong> of offspring — eggs always carry X; sperm carry either X or Y. An X-carrying sperm + egg = daughter (XX). A Y-carrying sperm + egg = son (XY).`
},
genetics_8:{
  explanation:`<strong>Sex-linked traits</strong> are controlled by genes on the sex chromosomes — almost always the <strong>X chromosome</strong> (very few functional genes are on the Y). Because females have two X chromosomes, a recessive sex-linked allele on one X can be masked by the dominant allele on the other X — she won't show the trait. Because males only have one X, any allele on that X is expressed — there's no backup. This is why males are far more frequently affected by X-linked recessive disorders like colorblindness and hemophilia.`,
  analogy:`The X chromosome is like a two-sided coin — females have two coins (one side can hide a flaw). The Y chromosome is like a one-sided coin — males have one double-sided and one single-sided. If the double-sided coin has a flaw on both sides, there's no backup.`,
  tested:`Know which traits are X-linked (colorblindness, hemophilia, Duchenne muscular dystrophy). Questions often ask why males are more affected: they only have <strong>one X copy</strong>, so one recessive allele is enough to express the trait.`
},
genetics_9:{
  explanation:`A <strong>carrier</strong> is a person who has one copy of a recessive disease allele on one X chromosome but has a normal dominant allele on the other X — so they don't have the disease, but they can pass it on. <strong>Only females can be carriers</strong> for X-linked recessive traits, because they have two X chromosomes. Males only have one X — if they carry the recessive allele, they express the disease immediately. There is no "silent carrier" status for males with X-linked traits.`,
  analogy:`A female carrier is like having a spare tire: one good tire (dominant allele) does the job, and the bad spare (recessive allele) is hidden in the trunk. A male only has one tire — if it's bad, he's stranded immediately. No spare.`,
  tested:`If a question describes a "male carrier," that's a red flag — it's wrong for X-linked recessive traits. Carrier mothers have a <strong>50% chance</strong> of passing the allele to sons (who will be affected) and daughters (who will be carriers). Carrier status is exclusive to females for X-linked traits.`
},
genetics_10:{
  explanation:`Males only have one X chromosome, so <strong>any allele on that X is automatically expressed</strong> — dominant or recessive. For an X-linked recessive trait like colorblindness, a male needs only one copy of the recessive allele (on his single X) to be affected. A female needs two copies — one on each X — to be affected. Since one copy is much more likely than two, males are statistically much more often affected.`,
  analogy:`Imagine a raffle where males have one ticket and females have two. A male with a "bad" ticket loses immediately. A female needs two bad tickets before she loses. Males are far more likely to "lose" on any single X-linked recessive trait.`,
  tested:`Questions ask why X-linked recessive traits appear more in males. The answer: males have <strong>one X</strong>, so one recessive allele is sufficient to express the trait. Females need <strong>two recessive alleles</strong> (one on each X) to show the trait.`
},
genetics_11:{
  explanation:`<strong>Polygenic traits</strong> are controlled by two or more genes working together. Each gene adds a small additive contribution to the phenotype. Because many different allele combinations are possible, the result is a <strong>continuous range</strong> of phenotypes in the population — displayed as a bell curve. Human height, skin color, and eye color are all polygenic. This explains why children can look significantly different from both parents and from each other.`,
  analogy:`Think of polygenic traits like building a Lego tower. Each gene adds one block. Each person gets a different random assortment of blocks — everyone ends up at a slightly different height with no clear discrete categories.`,
  tested:`If a question describes a <strong>bell-curve distribution</strong> of phenotypes, it's almost always a polygenic trait. This contrasts with simple Mendelian traits that show discrete categories (like wrinkled vs. smooth). Know that the more genes involved, the more continuous and bell-shaped the distribution.`
},
genetics_12:{
  explanation:`Pedigrees use a standardized visual language. <strong>Circles</strong> = females. <strong>Squares</strong> = males. <strong>Filled (shaded) shape</strong> = affected individual. <strong>Half-filled</strong> = carrier. <strong>Horizontal line</strong> = mated pair. <strong>Vertical line</strong> = offspring. Roman numerals label generations (I, II, III…). Numbers within a generation label individuals (II-3 = the third person in generation II). To identify a carrier, look for an unaffected individual who has an affected child or parent.`,
  analogy:`A pedigree is like a coded family photo album where shapes replace faces, and shading tells you who has the trait. Reading it is like cracking a simple visual code.`,
  tested:`You'll be shown a pedigree and asked to identify affected individuals, carriers, and inheritance pattern. Practice working backward: if a child is affected (aa) and parents are unaffected, those parents <strong>must both be carriers (Aa)</strong>. That logic is the most-tested pedigree skill.`
},
genetics_13:{
  explanation:`An <strong>autosomal dominant</strong> trait appears in <strong>every generation</strong> of a pedigree — it cannot skip. Every affected individual has at least one affected parent (because you need only one allele copy to express it). Males and females are equally affected. If two affected parents have an unaffected child, at least one parent must be <strong>heterozygous (Aa)</strong>, not homozygous dominant (AA).`,
  analogy:`Autosomal dominant is like a loud personality trait in a family — everywhere you look across generations, someone is loud. And loud people always have at least one loud parent.`,
  tested:`Look for "trait in every generation" and "affected individuals always have an affected parent." The trap: assuming dominant means everyone gets it — heterozygous dominant parents (Aa) can have unaffected (aa) children. Also: <strong>males and females equally affected</strong> distinguishes autosomal from sex-linked.`
},
genetics_14:{
  explanation:`An <strong>autosomal recessive</strong> trait can <strong>skip generations</strong> — it can hide in carriers who don't show the trait. The telltale pattern: two unaffected parents (both carriers, Aa) have an affected child (aa). Males and females are equally affected. When you see a trait skip a generation or two unaffected parents producing an affected child, autosomal recessive is the first hypothesis.`,
  analogy:`Recessive inheritance is like a secret that skips generations — grandparents carried it silently, parents carried it silently, and then it surfaced in the grandchild. The secret was there the whole time, just hidden.`,
  tested:`Look for: trait skips a generation, OR two unaffected parents with an affected child. The classic question: "What are the most likely genotypes of these parents?" If their child is affected (aa), both parents must be <strong>Aa</strong> (carriers). Males and females equally affected = autosomal (not sex-linked).`
},
genetics_15:{
  explanation:`<strong>Sex-linked recessive</strong> traits predominantly affect males. The classic pedigree pattern: many affected males with unaffected (carrier) mothers. An <strong>affected father cannot pass the trait to his sons</strong> — he gives sons the Y chromosome, not the X. So if you see the trait pass from grandfather to grandson through an unaffected mother, that's the X-linked recessive signature. Affected daughters are rare (they need two recessive X alleles) and only occur if the father is affected AND the mother is a carrier.`,
  analogy:`X-linked recessive is like a hidden message encoded in the X chromosome. The grandmother (or mother) quietly carries the message without "broadcasting" it, then passes it to sons who broadcast it openly.`,
  tested:`Look for: mostly males affected, carrier mothers, trait skips from grandfather to grandson. The biggest trap: thinking an affected father passes it to sons — <strong>he doesn't</strong>. He passes Y to sons and X to daughters. The X (with the recessive allele) goes to daughters only, making them carriers.`
},

// ── DNA, PROTEIN SYNTHESIS & BIOTECH ─────────────────────────
dna_0:{
  explanation:`Every <strong>nucleotide</strong> is built from three components: a <strong>phosphate group</strong> (forms the backbone), a <strong>5-carbon sugar</strong> (deoxyribose in DNA, ribose in RNA), and a <strong>nitrogenous base</strong> (A, T, G, or C in DNA; A, U, G, or C in RNA). The sugar and phosphate are always the same within a given nucleic acid — it's the base that varies and carries the genetic information. Nucleotides are strung together with phosphodiester bonds to form the long chains of DNA or RNA.`,
  analogy:`A nucleotide is like a train car. The phosphate is the coupling hook, the sugar is the chassis, and the base is the cargo. All cars have the same chassis and coupling — only the cargo (the base) differs, and that's what carries the message.`,
  tested:`Know the three components and what differs between DNA and RNA nucleotides. The exam may ask what sugar is in DNA (deoxyribose) vs. RNA (ribose), or which bases are in each. Also know that the base is the "information-carrying" component.`
},
dna_1:{
  explanation:`In DNA, <strong>adenine (A) pairs with thymine (T)</strong> and <strong>guanine (G) pairs with cytosine (C)</strong>. These pairings aren't random — A-T form 2 hydrogen bonds; G-C form 3 (making GC-rich DNA more stable). In RNA, there is no thymine — <strong>uracil (U) replaces T</strong>, so A pairs with U. These rules make the two strands of DNA complementary: knowing one strand lets you immediately figure out the other.`,
  analogy:`Base pairing is a strict lock-and-key system. A only fits T (or U in RNA). G only fits C. Trying to pair A with G is like trying to fit the wrong key in a lock — it doesn't work no matter how hard you try.`,
  tested:`You'll be given a DNA or mRNA sequence and asked to write the complementary strand. Key rule to remember: when going DNA → RNA, every <strong>T becomes U</strong> in the mRNA. The most common mistake is forgetting to swap T for U during transcription questions.`
},
dna_2:{
  explanation:`When DNA replicates, the double helix unwinds and each original strand serves as a <strong>template</strong> for a new complementary strand. The result: each new DNA molecule has <strong>one original (parental) strand and one newly synthesized strand</strong>. This "half-and-half" strategy is called <strong>semi-conservative replication</strong>. The Meselson-Stahl experiment (1958) confirmed this model using heavy nitrogen isotopes to track which strands were old vs. new.`,
  analogy:`Unzip a zipper down the middle. Each half becomes the template for a new matching half. You end up with two full zippers, each containing one original side and one new side.`,
  tested:`The exam may describe a replication model and ask which type it is. Semi-conservative = one old strand + one new strand per molecule. Don't confuse with conservative (both old strands stay together in one molecule) or dispersive (old and new randomly mixed throughout). Semi-conservative is the correct model.`
},
dna_3:{
  explanation:`DNA polymerase can only build a new strand in the <strong>5'→3' direction</strong>. On the <strong>leading strand</strong>, this direction happens to run toward the replication fork — so the strand is built continuously. On the <strong>lagging strand</strong>, the template runs in the wrong direction, so the strand must be built in short pieces that run <em>away</em> from the fork — these are <strong>Okazaki fragments</strong>. DNA ligase later stitches them into one continuous strand.`,
  analogy:`The leading strand is painting a fence in one long stroke left to right. The lagging strand is making short strokes from right to left, lifting the brush each time, then connecting all the strokes at the end.`,
  tested:`Know what Okazaki fragments are and why they form (lagging strand direction). The exam may ask which strand has Okazaki fragments (<strong>lagging strand</strong>) or what enzyme joins them (<strong>DNA ligase</strong>). Don't say leading strand.`,
  svgKey:`replication`
},
dna_4:{
  explanation:`The <strong>leading strand</strong> is synthesized <strong>continuously</strong> toward the replication fork because its template runs 3'→5', which matches the 5'→3' direction that DNA polymerase requires. The <strong>lagging strand</strong> template runs in the opposite direction (5'→3'), so it must be built in short <strong>Okazaki fragments</strong> that each move away from the fork. Both strands use the same DNA polymerase, but the lagging strand requires additional steps: primase (to lay RNA primers), polymerase (to extend), and ligase (to join fragments).`,
  analogy:`Two lanes of traffic at a construction zone. The leading lane flows straight through without stopping. The lagging lane has to back up repeatedly and re-enter — more complicated process, same destination.`,
  tested:`Know which strand is continuous (<strong>leading</strong>) vs. fragmented (<strong>lagging</strong>). A diagram question may show the replication fork and ask you to identify leading vs. lagging. The key is the direction of synthesis relative to fork movement.`,
  svgKey:`replication`
},
dna_5:{
  explanation:`DNA and RNA differ in three key ways. <strong>Sugar</strong>: DNA uses deoxyribose; RNA uses ribose (one fewer oxygen). <strong>Bases</strong>: DNA contains thymine (T); RNA contains uracil (U) instead. <strong>Strands</strong>: DNA is double-stranded (double helix); RNA is single-stranded. DNA stores genetic information long-term in the nucleus. RNA carries working copies of that information to the ribosome.`,
  analogy:`DNA is the original master blueprint locked in the vault (nucleus). RNA is the photocopy you bring to the job site (ribosome). The photocopy has a slightly different format — single page, slightly different notation (uracil instead of thymine) — but carries the same information.`,
  tested:`A comparison table is nearly guaranteed on exams. Know all three differences. The most commonly missed: RNA uses <strong>uracil, not thymine</strong>. Single-stranded RNA vs. double-stranded DNA is also frequently tested.`
},
dna_6:{
  explanation:`<strong>Transcription</strong> copies the information from a gene into a messenger RNA (mRNA) molecule. It happens in the <strong>nucleus</strong>. <strong>RNA polymerase</strong> binds to the promoter region, unwinds the DNA, and reads the template strand (3'→5') to build a complementary mRNA strand (5'→3'). The mRNA sequence matches the coding strand of DNA, except T is replaced by U. When complete, the mRNA exits through nuclear pores and travels to a ribosome in the cytoplasm.`,
  analogy:`Transcription is like taking notes from a textbook (DNA) into your notebook (mRNA). You rewrite the key information in a portable format so you can take it with you to where the work happens.`,
  tested:`Know the location (nucleus), the enzyme (RNA polymerase), the product (mRNA), and the direction of information flow (DNA → mRNA). The biggest confusion: mixing up transcription (DNA→mRNA) with translation (mRNA→protein). Location is a key differentiator — transcription is nuclear.`
},
dna_7:{
  explanation:`<strong>Translation</strong> is the process of reading the mRNA sequence at a <strong>ribosome</strong> to build a protein. The ribosome moves along mRNA three bases at a time — each three-base unit is a <strong>codon</strong>. Transfer RNA (<strong>tRNA</strong>) molecules each carry one specific amino acid and have a three-base <strong>anticodon</strong> that matches a codon. When an anticodon matches its codon, the amino acid is added to the growing <strong>polypeptide chain</strong>. Translation ends when the ribosome reaches a stop codon.`,
  analogy:`Translation is like following a recipe. The mRNA is the recipe. The ribosome is the chef. tRNA molecules are delivery drivers bringing the exact right ingredients (amino acids) one at a time, matching their delivery code (anticodon) to the recipe's ingredient code (codon). The finished dish is the protein.`,
  tested:`Know where translation happens (ribosome in <strong>cytoplasm</strong>), what reads the codons (tRNA via anticodon), and the flow of information (mRNA → protein). Don't put translation in the nucleus. The exam may also ask about the start codon (AUG) and stop codons (UAA, UAG, UGA).`,
  svgKey:`translation`
},
dna_8:{
  explanation:`A <strong>codon</strong> is a three-base sequence on mRNA that codes for one specific amino acid (or a start/stop signal). There are 64 possible codons (4³) but only 20 amino acids — so most amino acids are coded by multiple codons (the genetic code is <strong>redundant</strong>). An <strong>anticodon</strong> is the complementary three-base sequence on tRNA. The tRNA's anticodon base-pairs with the mRNA codon, ensuring the correct amino acid is delivered to the growing chain.`,
  analogy:`A codon is like a hotel room number. The anticodon is the matching key card. Only the exact matching key (anticodon) opens that room number (codon) to deliver the right guest (amino acid).`,
  tested:`Know codon (on mRNA) vs. anticodon (on tRNA). If given a codon, write the anticodon as the complementary bases. Remember: <strong>AUG is the universal start codon</strong> (codes for methionine). The exam may give an mRNA sequence and ask you to determine the anticodon of the tRNA that would bind to the third codon, etc.`
},
dna_9:{
  explanation:`<strong>AUG</strong> is the <strong>start codon</strong> — every protein's translation begins here, and AUG always codes for the amino acid <strong>methionine</strong>. Every ribosome begins translation at AUG; every protein starts with methionine (sometimes removed after). There are three <strong>stop codons</strong>: <strong>UAA, UAG, and UGA</strong>. These don't code for any amino acid — they signal the ribosome to detach and release the completed polypeptide. No tRNA has an anticodon for stop codons.`,
  analogy:`AUG is the green traffic light — translation starts moving. UAA, UAG, and UGA are the red lights — everything stops and the protein is released. There are three red lights but only one green.`,
  tested:`Know AUG = start = methionine. Know the three stop codons (UAA, UAG, UGA). The exam may give you an mRNA sequence and ask where translation begins (first AUG) or ends (first stop codon). Also: a nonsense mutation is one that changes a codon into a stop codon prematurely, ending the protein early.`
},
dna_10:{
  explanation:`There are three types of point mutations. <strong>Substitution</strong>: one base is swapped for another — affects only one codon and may be silent, missense, or nonsense. <strong>Insertion</strong>: one or more bases are added — shifts the reading frame for everything downstream. <strong>Deletion</strong>: one or more bases are removed — also shifts the reading frame. Insertions and deletions are generally more damaging because they cause frameshifts, while substitutions affect only a single codon.`,
  analogy:`Think of DNA as a sentence where every word is exactly 3 letters: "THE CAT ATE THE RAT." Substitution = change one letter of one word. Insertion = add a letter somewhere. Deletion = remove a letter. Adding or removing breaks every three-letter word after it — that's the frameshift effect.`,
  tested:`Know all three types and what distinguishes them. The key exam distinction: <strong>substitutions affect one codon</strong>; <strong>insertions and deletions cause frameshifts</strong> that affect everything downstream. If a question asks which mutation causes the most damage, the answer is insertion or deletion (frameshift).`
},
dna_11:{
  explanation:`When one or two bases are inserted or deleted, the reading frame is shifted. Since the ribosome reads in triplets (codons), shifting the frame by one position scrambles every single codon after the mutation point — producing an entirely different (usually nonfunctional or truncated) protein. Notably, inserting or deleting exactly <strong>three bases</strong> does NOT cause a frameshift — it adds or removes exactly one amino acid without disrupting the rest of the sequence.`,
  analogy:`Back to the sentence: "THE CAT ATE THE RAT." Insert the letter X after position 3: "THE XCA TAT ETH ERA T..." — every word is now gibberish. Delete one letter: same chaos. But delete exactly 3 letters (one word): "THE ATE THE RAT" — the sentence still mostly makes sense, just shorter.`,
  tested:`Know why frameshifts are more damaging than substitutions (they scramble the entire downstream sequence). Also know: adding/deleting 3 bases = no frameshift, just adds/removes one amino acid. This is a <strong>classic trick question</strong> on exams.`
},
dna_12:{
  explanation:`The genetic code is <strong>redundant (degenerate)</strong> — multiple different codons can code for the same amino acid. For example, UUU and UUC both code for phenylalanine. A <strong>silent mutation</strong> is a substitution that changes the codon but the new codon codes for the <em>same</em> amino acid — so the protein is unchanged. The DNA changed, but there's no effect on the organism's phenotype. This is why the genetic code's redundancy acts as a built-in buffer against certain mutations.`,
  analogy:`If a recipe says "add 2 cups of flour" and someone changes it to "add dos cups de harina," the flour amount is the same — the wording changed, but the outcome didn't. Silent mutation works the same way.`,
  tested:`If asked why a mutation has no effect on the protein, the answer is the <strong>redundancy of the genetic code</strong> — silent mutation. Don't confuse this with "no mutation occurred" — the DNA <em>did</em> change. A silent mutation is still a mutation; it just happens to code for the same amino acid.`
},
dna_13:{
  explanation:`<strong>Gel electrophoresis</strong> separates DNA fragments by size using electricity. DNA has a negative charge (from its phosphate backbone), so it migrates toward the <strong>positive electrode</strong>. Smaller fragments move more easily through the gel and travel <strong>farther</strong> from the starting wells. Larger fragments are slower and stay <strong>closer to the wells</strong>. After running, UV light reveals the banding pattern, which can be compared across samples for identification or diagnosis.`,
  analogy:`Gel electrophoresis is like a race where smaller, lighter runners are faster. All runners start at the same starting line (the well). After a set time, the short fast runners (small DNA) have covered more ground than the large slow ones (big DNA).`,
  tested:`Know which fragments travel farther (<strong>smaller fragments</strong>) vs. stay near the top (<strong>larger fragments</strong>). The exam may show a gel image and ask you to compare samples or rank fragments by size. Wells are always at the top; smallest fragments are at the bottom.`
},
dna_14:{
  explanation:`A <strong>DNA fingerprint</strong> is a unique pattern of DNA bands produced by gel electrophoresis, specific to each individual (except identical twins). Scientists cut DNA at specific highly variable repeated sequences using restriction enzymes, then run fragments through a gel. The pattern of bands is like a bar code — unique and consistent for each person throughout their lifetime. Used in forensics (matching crime scene DNA), paternity testing, and identifying human remains.`,
  analogy:`A DNA fingerprint is like a barcode for a person. Every individual has a unique barcode that never changes, and scanning it always identifies the same person.`,
  tested:`Know what a DNA fingerprint is and its applications (forensics, paternity testing). The exam may show a gel with samples from a crime scene, suspects, and victim, and ask you to match them. The matching sample has the same <strong>band pattern at the same positions</strong>.`
},
dna_15:{
  explanation:`<strong>Recombinant DNA</strong> is DNA created by cutting and joining DNA from two different organisms or sources. The process uses <strong>restriction enzymes</strong> to cut DNA at specific sequences (leaving "sticky ends"), then <strong>DNA ligase</strong> to paste the pieces together. This lets scientists insert useful genes (like the human insulin gene) into bacterial plasmids. The bacteria then express the human gene and produce the protein at large scale — this is how most medical insulin is manufactured today.`,
  analogy:`Recombinant DNA is like cutting a quote from one book and pasting it into another. The new book now contains text from two different original sources — that's what "recombinant" means.`,
  tested:`Know that recombinant DNA combines DNA from two sources, uses restriction enzymes to cut, and DNA ligase to join. The classic application: inserting the <strong>human insulin gene into bacteria</strong>. Also know the concept of a plasmid — the circular bacterial DNA used as the "vehicle" to carry the foreign gene.`
},
dna_16:{
  explanation:`<strong>CRISPR-Cas9</strong> is a gene-editing system that acts like molecular scissors. A <strong>guide RNA</strong> (gRNA) is designed to match the target DNA sequence, directing the <strong>Cas9 protein</strong> to that exact location where it makes a precise cut. Scientists can then disable a gene, correct a mutation, or insert a new sequence. CRISPR is faster, cheaper, and more precise than all previous gene-editing technologies. Applications include cancer research, treating genetic diseases, developing disease-resistant crops, and basic biological research.`,
  analogy:`CRISPR is like the "Find and Replace" function in a word processor — but for DNA. You specify exactly what sequence to find, and it goes there and makes the edit you specify, leaving everything else unchanged.`,
  tested:`Know what CRISPR does (precisely cuts and edits DNA at a specific sequence), the two key components (guide RNA + Cas9 protein), and what it's used for (disease research, genetic therapy, agriculture). You may be asked what distinguishes CRISPR from older methods: its <strong>precision, simplicity, and low cost</strong>.`
},
dna_17:{
  explanation:`<strong>Clones</strong> are genetically identical copies of an organism. Natural cloning occurs with identical twins. Artificial cloning is done via <strong>somatic cell nuclear transfer (SCNT)</strong>: the nucleus is removed from an egg cell, and a nucleus from a donor somatic (body) cell is inserted. The egg is stimulated to develop into an embryo that is genetically identical to the donor. This technique produced <strong>Dolly the sheep</strong> in 1996 — the first mammal cloned from an adult cell.`,
  analogy:`Making a clone via nuclear transfer is like swapping the hard drive in a laptop. The new computer (the egg) has the original operating system (donor DNA) installed. It will run all the same programs as the original.`,
  tested:`Know that clones have the same <strong>nuclear DNA</strong> as the donor (slight mitochondrial DNA differences from the egg donor exist). Know the technique name (somatic cell nuclear transfer). Distinguish natural clones (identical twins) from artificial ones. Dolly the sheep is the classic example.`
},

// ── EVOLUTION & ECOLOGY ───────────────────────────────────────
evo_0:{
  explanation:`Darwin's natural selection works through four requirements. First, individuals in a population show natural <strong>variation</strong>. Second, some of that variation is <strong>heritable</strong> (passed to offspring). Third, more individuals are born than can survive with available resources (<strong>overproduction</strong>). Fourth, individuals with favorable variations are more likely to <strong>survive and reproduce</strong>, passing those traits to more offspring. Over generations, favorable traits become more common — the population evolves.`,
  analogy:`Natural selection is like a filter. Pour the entire population through the filter — organisms with traits that fit the environment pass through; those that don't are caught. Over many generations, the pool looks more and more like the traits that passed.`,
  tested:`Know all four requirements: variation, heritability, differential survival/reproduction, change in allele frequency. Questions may ask "what is required for natural selection to occur?" All four must be present. If variation is absent or if traits aren't heritable, natural selection cannot work.`
},
evo_1:{
  explanation:`Biological <strong>fitness</strong> has nothing to do with physical strength or speed. Fitness is specifically measured as <strong>how many surviving, reproducing offspring an organism produces</strong>. A huge, powerful lion that never mates has zero fitness. A small, fragile fish that produces 500 surviving offspring has very high fitness. Fitness is always relative to the current environment — a trait that increases fitness in one environment may reduce it in another.`,
  analogy:`Fitness is like a score in a game where the <em>only</em> way to score is to have offspring that also survive and reproduce. Physical strength is just one possible strategy — there are many ways to score high.`,
  tested:`Students often say "the strongest survive" — the correct answer is "the most <strong>reproductively successful</strong> survive." Always frame fitness in terms of reproduction. A classic trick: being very healthy but sterile = zero fitness. Fitness is about passing genes, not personal survival.`
},
evo_2:{
  explanation:`No — <strong>evolution happens to populations, not individuals</strong>. An individual organism's DNA is fixed at birth (barring mutations) and cannot change to improve their survival within their lifetime. What individuals do is adapt <em>behaviorally</em>. What populations do over many generations is <strong>evolve</strong> through changes in allele frequencies. This was one of Darwin's most important insights — and one of the most commonly misunderstood.`,
  analogy:`A single song cannot change its genre — but a band can change its sound over many albums and years. Individuals are like songs (fixed once recorded); populations are like bands (they evolve their style over time).`,
  tested:`If a question asks whether a giraffe's neck grew longer because it stretched it during its lifetime, the answer is <strong>no</strong> — that's Lamarckism, which is incorrect. If traits aren't heritable, they don't contribute to evolution. The correct view: giraffes with genetically longer necks survived better and reproduced more.`
},
evo_3:{
  explanation:`A <strong>species</strong> is a group of organisms that can <strong>interbreed naturally</strong> with each other and produce <strong>fertile offspring</strong>. The "fertile" part is essential — horses and donkeys can mate and produce mules, but mules are <strong>sterile</strong>. Therefore horses and donkeys are classified as different species. Reproductive isolation — geographic, behavioral, or genetic barriers that prevent interbreeding — is what keeps species distinct and allows them to diverge over time.`,
  analogy:`A species is a social club where membership is determined by the ability to have fertile children together. If two groups can't produce fertile children together, they're in different clubs.`,
  tested:`The biological species concept defines a species by interbreeding + fertile offspring. Know why horses and donkeys are different species (mules are sterile). Questions may also ask what eventually happens when two populations are geographically isolated for a long time (they may diverge into separate species via speciation).`
},
evo_4:{
  explanation:`An <strong>adaptation</strong> is a <strong>heritable trait</strong> that increases an organism's fitness in its specific environment. Adaptations must be genetic — behavioral changes or physical changes during an individual's lifetime are NOT adaptations. Natural selection gradually increases the frequency of adaptive traits in the population over many generations. Examples: camouflage in stick insects, antibiotic resistance in bacteria, the streamlined body of dolphins.`,
  analogy:`An adaptation is like a well-designed tool for a specific job. A fish's streamlined body is adapted for moving through water the same way a hammer is designed for driving nails — it's purpose-built by the process of selection.`,
  tested:`Know that adaptations are <strong>heritable (genetic)</strong> and increase fitness. Don't confuse adaptation (evolutionary, heritable) with acclimatization (physiological response during lifetime, not heritable — like getting a tan or growing bigger lungs at high altitude).`
},
evo_5:{
  explanation:`Four types of evidence support evolution. <strong>Fossil record</strong>: shows organisms changing over time and reveals transitional forms. <strong>Comparative anatomy</strong>: homologous structures (same bones, different functions) show common ancestry; vestigial structures show evolutionary history. <strong>Biogeography</strong>: distribution of species across continents matches predictions from common ancestry. <strong>Molecular evidence</strong>: comparing DNA and protein sequences — more similarity = more recent common ancestor.`,
  analogy:`These four lines of evidence are like four independent witnesses testifying to the same event. They came from different angles (rocks, bones, maps, molecules), but they all point to the same conclusion: species share common ancestors and change over time.`,
  tested:`Know all four categories. The most-tested distinction: which evidence Darwin would have known about (fossils, anatomy, biogeography) vs. which he couldn't have known about (<strong>molecular/DNA evidence</strong>). If a question asks "which could NOT have been used by Darwin?" — anything involving DNA or protein comparison.`
},
evo_6:{
  explanation:`Darwin published "On the Origin of Species" in <strong>1859</strong>. He was aware of three lines of evidence: the fossil record, comparative anatomy (homologous and vestigial structures), and biogeography (why similar species live near each other). He had <strong>no knowledge</strong> of DNA, genetics, chromosomes, or molecular biology — those fields didn't exist. Mendel's genetics came in the 1860s (unknown to Darwin). DNA structure was solved in 1953. The integration of genetics with Darwin's theory is called the <strong>Modern Synthesis</strong>.`,
  analogy:`Darwin was a detective who solved the case using only eyewitnesses and physical evidence. Later scientists added DNA testing to the same case — the conclusion didn't change, but the evidence base became much stronger.`,
  tested:`Exam favorite: "Which of the following would Darwin have used as evidence?" If it involves DNA, genes, proteins, or molecular comparison — the answer is <strong>NO</strong>. Fossils, comparative anatomy, and biogeography = <strong>YES</strong>, Darwin knew these. This distinction is tested regularly.`
},
evo_7:{
  explanation:`<strong>Homologous structures</strong> have the same underlying anatomy (same bones, same embryonic origin) because they descended from a common ancestor — even if they now perform very different functions. Example: human arm, whale flipper, bat wing, bird wing all share the same humerus/radius/ulna bone arrangement. <strong>Analogous structures</strong> have similar functions but <em>different</em> structures and <em>no</em> shared ancestry — they evolved independently. Example: bird wing vs. insect wing (same function of flight, completely different structure).`,
  analogy:`Homologous = two cousins who both have their grandmother's nose — same inherited structure, different people. Analogous = two strangers who both happen to be wearing hats — similar function, completely unrelated.`,
  tested:`High-frequency exam topic. The key test: same structure/different function = <strong>homologous</strong> (shared ancestry, evidence for evolution). Similar function/different structure = <strong>analogous</strong> (convergent evolution, no shared ancestry). Wings on birds vs. bats = homologous. Wings on birds vs. insects = analogous.`
},
evo_8:{
  explanation:`<strong>Vestigial structures</strong> are reduced or nonfunctional remnants of structures that were fully functional in an organism's ancestors. They persist because they haven't been strongly selected against. Human examples: <strong>coccyx</strong> (tailbone — remnant of a tail), ear muscles (we can't move our ears like dogs can), appendix, goosebumps (used to raise fur in ancestors). <strong>Whale pelvis bones</strong> — embedded deep in whale muscle — show that whale ancestors walked on land millions of years ago.`,
  analogy:`A vestigial structure is like a USB-A port on a modern laptop — it's there from the original design, it served a clear purpose in the past, but modern usage has largely moved on. The structure persists even though it's not really needed anymore.`,
  tested:`Know several examples of vestigial structures and what they reveal about ancestral lifestyles. The exam may ask why vestigial structures are evidence for evolution: they show that today's organisms share ancestry with very different organisms.`
},
evo_9:{
  explanation:`<strong>Microevolution</strong> refers to small-scale changes in <strong>allele frequencies within a single population</strong> over time. These are measurable, real-time changes in a gene pool — like antibiotic resistance spreading through bacteria, or beak size shifting in a bird population after a drought. Microevolution is evolution at the population level within one species. Over long time spans, microevolutionary changes can accumulate into the larger changes we call macroevolution (speciation, major body plan changes).`,
  analogy:`Microevolution is the slow daily change of a river's course — each shift is small, but over time the river carves a new path. Macroevolution is the canyon the river carved over millions of years.`,
  tested:`Know the definition of microevolution (change in allele frequency within a population). It is evolution — just on a small, observable scale. Distinguish from macroevolution (origin of new species or higher taxonomic groups). Both are driven by the same mechanisms (selection, drift, flow, mutation).`
},
evo_10:{
  explanation:`<strong>Hardy-Weinberg equilibrium</strong> describes a theoretical population where allele frequencies don't change over time — i.e., a population that is <strong>NOT evolving</strong>. It requires five conditions simultaneously: no mutations, no natural selection, random mating, no gene flow (migration in or out), and a large population size. If any condition is violated, evolution occurs. H-W is mainly used as a <strong>null hypothesis</strong>: if a population deviates from H-W, something is causing evolution.`,
  analogy:`Hardy-Weinberg is like a perfectly still pond. Any disturbance — a stone thrown in (mutation), wind (selection), a river flowing through (gene flow), or a tiny pond (small population/drift) — creates ripples. In nature, the pond is never truly still.`,
  tested:`Know all <strong>five conditions</strong>. The exam will say "which of these would DISRUPT Hardy-Weinberg equilibrium?" — any violation of the five conditions is the answer. The key insight: H-W doesn't describe reality; it describes what a non-evolving baseline looks like so we can detect evolution.`
},
evo_11:{
  explanation:`<strong>Genetic drift</strong> is a change in allele frequencies caused by <strong>random chance events</strong>, not by natural selection. It occurs in all populations but has the greatest impact in <strong>small populations</strong>, where the random deaths or reproductive failures of a few individuals can dramatically change allele frequencies — or eliminate an allele entirely. Genetic drift can fix (100%) or eliminate (0%) an allele even if it provides no selective advantage or disadvantage.`,
  analogy:`Genetic drift is like rolling dice. With millions of rolls, the law of averages rules. With only 10 rolls, you might get all sixes by chance — that's the small population effect. In small populations, random chance dominates.`,
  tested:`Know that genetic drift is <strong>random, not directional</strong> — unlike natural selection. Also know it's stronger in small populations. The exam often contrasts these: genetic drift = random change. Natural selection = non-random, directional change driven by differential reproductive success.`
},
evo_12:{
  explanation:`Both are forms of genetic drift. The <strong>bottleneck effect</strong> occurs when a population is drastically reduced by a random event (disease, natural disaster, hunting), leaving a small surviving group with much less genetic diversity than the original. All descendants of this small group have reduced diversity. The <strong>founder effect</strong> occurs when a small group breaks away from a larger population and starts a new colony elsewhere — carrying only a subset of the original genetic variation in their gene pool.`,
  analogy:`Bottleneck: a jar of 1,000 marbles (many colors) is knocked over and only 10 roll out. Your new jar has limited color variety. Founder effect: someone deliberately takes 10 specific marbles to start a new jar elsewhere — only those colors exist in the new location.`,
  tested:`Know both effects, that both are forms of genetic drift, and both result in <strong>reduced genetic diversity</strong>. Classic examples: cheetahs (nearly identical genetics = past bottleneck), Amish communities (founder effect — small founding group). The exam may present a scenario and ask which effect applies.`
},
evo_13:{
  explanation:`<strong>Gene flow</strong> is the transfer of alleles between populations via <strong>migration</strong>. Individuals moving into a population (immigration) bring new alleles. Individuals moving out (emigration) remove alleles. Gene flow tends to make geographically separate populations <strong>more similar</strong> over time by mixing their gene pools. Barriers to gene flow (mountains, oceans, roads, habitat fragmentation) can isolate populations, allowing them to diverge and potentially speciate.`,
  analogy:`Gene flow is like mixing two buckets of different-colored paint by pouring a little of each into the other. The more you mix, the more similar the colors become. Seal the buckets and leave them alone — over time they can develop very different colors (populations diverge).`,
  tested:`Know that gene flow <strong>introduces or removes alleles</strong> from a population and that it violates Hardy-Weinberg equilibrium. High gene flow = populations stay similar. Barriers to gene flow = populations diverge → potential speciation. This connection to speciation (geographic isolation) is commonly tested.`
},
evo_14:{
  explanation:`Selection can act on variation in four ways. <strong>Stabilizing</strong>: the intermediate phenotype is favored; both extremes are eliminated (reduces variation). <strong>Directional</strong>: one extreme phenotype is favored; the distribution shifts that direction. <strong>Disruptive</strong>: both extremes are favored, the middle is eliminated (can split into two groups). <strong>Sexual selection</strong>: traits that improve mating success are favored, even at some survival cost (peacock tails, elk antlers).`,
  analogy:`Stabilizing = a professor who gives B's to average students and fails the very high and very low scorers. Directional = grading where only the top students pass — everyone else shifts to study harder. Disruptive = only the very top AND very bottom pass, failing everyone in the middle.`,
  tested:`You'll be shown a bell curve and asked which type of selection is occurring. Key: which part of the distribution is favored? <strong>Middle favored = stabilizing. One tail = directional. Both tails = disruptive.</strong> The exam may also give a real-world example and ask you to classify it.`,
  svgKey:`naturalSelection`
},
evo_15:{
  explanation:`Both show evolutionary relationships. A <strong>cladogram</strong> shows the <em>branching order</em> of groups — which species share a common ancestor and in what sequence — but does not indicate how much time passed or how much evolutionary change occurred between branches. A <strong>phylogenetic tree</strong> includes a time scale and branch lengths that reflect the degree of evolutionary change. A <strong>clade</strong> is a group consisting of a common ancestor plus all its descendants.`,
  analogy:`A cladogram is a family tree showing who is related to whom, without dates. A phylogenetic tree is the same family tree with actual birth years and marriage dates added — it shows the timeline, not just the relationships.`,
  tested:`Know the difference between cladograms (relative relationships only) and phylogenetic trees (include time/change). Also know how to read both: the most closely related species share the <strong>most recent common ancestor</strong>. The exam may show a diagram and ask "which two species are most closely related?" — trace to the nearest shared node.`
},
evo_16:{
  explanation:`On a cladogram, the two most closely related species are those that share the <strong>most recent common ancestor</strong> — the branching point (node) closest to both of them. You find their relationship by tracing back from each species to where they first share a node. The more recently two lineages branched apart, the more closely related they are. Species that share an ancient, deep node are more distantly related even if they appear near each other on the diagram.`,
  analogy:`On a family tree, your siblings are closest (common ancestor = your parents, very recent). Your cousins are more distant (common ancestor = grandparents). Your third cousins even more so. Tracing to the most recent fork gives you the closest relative.`,
  tested:`Cladogram-reading questions are very common. The classic trap: two species positioned next to each other on the tips are NOT necessarily most closely related — you must trace back to the actual branching <strong>node</strong>. Always find the most recent shared node, not the physical proximity on the page.`
},
evo_17:{
  explanation:`An <strong>invasive species</strong> is a non-native organism introduced (intentionally or accidentally) into a new ecosystem where it faces <strong>no natural predators, competitors, or diseases</strong> to control its population. Without these checks, the species grows rapidly, often outcompeting native species for food, space, and light. Invasive species are one of the leading causes of biodiversity loss worldwide. Examples: zebra mussels (Great Lakes), kudzu vine (southeastern US), cane toads (Australia).`,
  analogy:`An invasive species is like a new player who joins a game already knowing all the rules while other players are learning. That player wins every round until others adapt — except in ecosystems, native species often can't adapt fast enough.`,
  tested:`Know the definition: non-native + no natural population controls + disrupts native ecosystem. Questions may describe a scenario and ask you to identify the invasive species or predict its ecological impact. Common effect: native species decline or go extinct due to competition or predation.`
},
evo_18:{
  explanation:`Every organism is shaped by two categories of environmental factors. <strong>Biotic factors</strong> are living components: predators, prey, competitors, parasites, mutualistic partners, decomposers. <strong>Abiotic factors</strong> are non-living physical and chemical components: temperature, light intensity, rainfall, soil chemistry, pH, salinity, elevation. Both categories influence where organisms live, how populations grow, and which traits are favored by natural selection.`,
  analogy:`Think of an organism's environment as a recipe. Abiotic factors are the cooking conditions (oven temperature, altitude, humidity). Biotic factors are the other ingredients in the pot — some help, some compete, some try to eat you.`,
  tested:`Know clear examples of each. Biotic: predation, disease, competition. Abiotic: temperature, water, light, soil type. Questions often give a scenario and ask which factor (biotic or abiotic) is limiting a population. <strong>Disease = biotic. Temperature drop = abiotic.</strong>`
},
evo_19:{
  explanation:`<strong>Density-dependent limiting factors</strong> intensify as population density increases — they're built-in regulators. Examples: disease (spreads faster in crowded populations), competition for food and space, predation (predators focus where prey is dense). <strong>Density-independent factors</strong> affect populations regardless of their size — a wildfire hits a small or large population equally. Examples: natural disasters, extreme weather, volcanic eruptions, drought.`,
  analogy:`Density-dependent = traffic congestion. The more cars on the road, the worse it gets — density directly drives the effect. Density-independent = a meteor strike. It doesn't matter how many cars were on the road when the meteor hit.`,
  tested:`Know which factors belong in each category. <strong>Disease, predation, competition = density-dependent.</strong> <strong>Weather events, natural disasters = density-independent.</strong> Questions may describe a scenario (e.g., "a flood kills 80% of the population regardless of density") and ask which type of factor this represents.`
},
evo_20:{
  explanation:`<strong>Exponential growth</strong> (J-curve) occurs when resources are unlimited — the population grows by an increasing amount each generation. This is typical when a species enters a new, resource-rich environment. <strong>Logistic growth</strong> (S-curve) occurs when resources are limited — the population grows fast initially, then slows as it approaches <strong>carrying capacity (K)</strong>, where birth rate equals death rate and the population stabilizes. Most natural populations show logistic growth.`,
  analogy:`Exponential growth is like compound interest — the balance grows by larger and larger amounts. Logistic growth is like filling a glass with water — fast at first, slowing as you approach the rim, and leveling off when full. Carrying capacity is the rim.`,
  tested:`Know J-curve = exponential (unlimited resources) and S-curve = logistic (limited resources, levels off at K). A question may show a growth graph and ask you to identify the type, or ask what happens to growth rate as the population approaches K — it <strong>slows down and approaches zero</strong>, not stops abruptly.`,
  svgKey:`popGrowth`
},
evo_21:{
  explanation:`<strong>Carrying capacity (K)</strong> is the maximum population size that an environment can sustainably support given available resources — food, water, space, shelter, light. Below K, birth rate exceeds death rate and the population grows. At K, birth rate equals death rate and the population stabilizes. Above K, death rate exceeds birth rate (resources are depleted) and the population declines back toward K. Carrying capacity changes if the environment changes — a drought lowers K, improved conditions raise it.`,
  analogy:`Carrying capacity is like the max occupancy sign on an elevator. You can temporarily squeeze more people in, but the elevator breaks down (resources collapse) and everyone has to leave. The sign is the sustainable limit.`,
  tested:`Know the definition and symbol (K). Questions ask: what happens to growth rate as population approaches K? (Slows to zero.) What happens if a population overshoots K? (Declines back, possibly oscillates.) Carrying capacity is set by limiting factors in the environment.`
},
evo_22:{
  explanation:`A <strong>keystone species</strong> has a disproportionately large impact on its ecosystem relative to its population size — remove it and the whole ecosystem restructures. Removing a keystone species triggers a <strong>trophic cascade</strong> — a chain reaction of population changes rippling up and down the food web. Classic example: wolves reintroduced to Yellowstone → elk populations reduced → riverbank vegetation recovered → rivers stabilized → beaver populations rebounded. The wolves changed the entire landscape.`,
  analogy:`A keystone is the central stone at the top of an arch. Pull it out and the whole arch collapses. A keystone species holds the ecological structure together — without it, everything shifts dramatically.`,
  tested:`Know the definition of keystone species and be able to trace a trophic cascade logic. Questions may give a food web and ask what happens when a top predator or keystone species is removed. Trace the chain: if wolves disappear → deer overpopulate → vegetation depleted → other species decline.`
},
evo_23:{
  explanation:`Species interactions are classified by how each partner is affected. <strong>Mutualism (+/+)</strong>: both benefit (bees and flowers, clownfish and anemone). <strong>Commensalism (+/0)</strong>: one benefits, the other is unaffected (barnacles on a whale, cattle egrets following buffalo). <strong>Parasitism (+/−)</strong>: one benefits at the other's expense (tapeworms, ticks, mistletoe on a tree). Note: predation is sometimes considered separately, but it fits the +/− framework — predator benefits, prey is harmed (and killed).`,
  analogy:`Mutualism = a win-win business partnership. Commensalism = hitchhiking — you get a free ride, the driver doesn't notice. Parasitism = someone pickpocketing you — they gain, you lose, often without realizing it at first.`,
  tested:`Know all three types and the +/+, +/0, +/− notation. Common exam traps: confusing commensalism (other unaffected) with mutualism (other also benefits). Also: predation vs. parasitism — <strong>predators kill prey immediately; parasites exploit the host over time without usually killing immediately</strong>.`
},
evo_24:{
  explanation:`<strong>Ecological succession</strong> is the gradual change in species composition in a habitat over time. <strong>Primary succession</strong> begins on completely bare substrate with <strong>no soil</strong> (after volcanic eruption, retreating glacier). Pioneer species like lichens and mosses slowly break down rock and build soil — it can take thousands of years to reach a climax community. <strong>Secondary succession</strong> begins after a disturbance where <strong>soil already exists</strong> (after wildfire, flood, or clear-cutting). It proceeds much faster because soil is already present.`,
  analogy:`Primary succession = building a house on an empty lot from scratch — you start by hauling in foundation materials. Secondary succession = remodeling a house after a fire — the foundation and soil are intact, so you can rebuild much faster.`,
  tested:`Know the key distinction: <strong>primary = no soil, starts from scratch</strong> (lichens as pioneer species). <strong>Secondary = soil remains, faster recovery.</strong> The exam may describe a scenario ("a lava flow covered the hillside") and ask which type — no previous soil = primary. After fire or logging = secondary.`
}
};
